<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Team Eagles Controller</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a1f12 0%, #0d2d18 100%);
      color: #e8e8e8;
      font-family: 'Segoe UI', 'Courier New', monospace;
    }
    h1 { 
      font-size: 2rem; 
      letter-spacing: 0.15em; 
      margin-bottom: 1.5rem; 
      color: #009036;
      text-shadow: 0 0 10px rgba(0, 144, 54, 0.5);
      font-weight: 700;
    }
    .section-label {
      font-size: 0.68rem; color: #009036;
      letter-spacing: 0.12em; text-align: center;
      margin: 1rem 0 0.5rem;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
      width: 330px;
      margin-bottom: 0.5rem;
    }
    button {
      padding: 1rem 0.4rem; 
      font-size: 0.85rem; 
      font-family: inherit;
      border: 2px solid #009036; 
      border-radius: 6px;
      background: rgba(0, 144, 54, 0.1);
      color: #009036;
      cursor: pointer; 
      letter-spacing: 0.05em;
      transition: all 0.2s ease;
      font-weight: 600;
    }
    button:hover { 
      background: #009036; 
      color: #ffffff;
      box-shadow: 0 0 12px rgba(0, 144, 54, 0.6);
      transform: translateY(-2px);
    }
    button:active { transform: translateY(0); }
    button.danger  { 
      border-color: #ff4444; 
      color: #ff4444;
      background: rgba(255, 68, 68, 0.1);
    }
    button.danger:hover { 
      background: #ff4444; 
      color: #ffffff;
      box-shadow: 0 0 12px rgba(255, 68, 68, 0.6);
    }
    button.blue    { 
      border-color: #ffcc00; 
      color: #ffcc00;
      background: rgba(255, 204, 0, 0.1);
    }
    button.blue:hover { 
      background: #ffcc00; 
      color: #000000;
      box-shadow: 0 0 12px rgba(255, 204, 0, 0.6);
    }
    button.wide    { grid-column: span 3; }
    button.wide2   { grid-column: span 2; }
    #status {
      margin-top: 1.4rem; 
      font-size: 0.82rem;
      color: #009036; 
      min-height: 1.2em; 
      text-align: center;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>🦅 EAGLES CTRL</h1>

  <!-- MOVEMENT CONTROL -->
  <div class="grid">
    <button class="blue"   onclick="cmd('pivotleft')">◀ LEFT</button>
    <button class="danger" onclick="cmd('stop')">✕ STOP</button>
    <button class="blue"   onclick="cmd('pivotright')">▶ RIGHT</button>
    <button class="wide" onclick="cmd('forward')">▲ FWD</button>
    <button class="wide" onclick="cmd('backward')">▼ BACKWARD</button>
  </div>

  <!-- STANCE -->
  <div class="grid">
    <button class="wide" onclick="cmd('stand')">⬛ STAND</button>
  </div>

  <div id="status">ready</div>
  <script>
    async function cmd(action) {
      document.getElementById('status').textContent = action + '...';
      try {
        const r = await fetch('/' + action);
        document.getElementById('status').textContent = await r.text();
      } catch(e) {
        document.getElementById('status').textContent = 'error: ' + e;
      }
    }
  </script>
</body>
</html>
